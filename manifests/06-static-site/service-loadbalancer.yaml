apiVersion: v1
kind: Service
metadata:
  name: static-site-lb
  labels:
    app: static-site
  annotations:
    # Request an AWS Network Load Balancer (Layer 4 TCP).
    # Only works on EKS — on kubeadm EXTERNAL-IP stays <pending>.
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: LoadBalancer
  selector:
    app: static-site
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
