# =============================================================================
# secret-credentials.yaml
# Opaque Secret storing sensitive application credentials
#
# CONCEPT:
#   A Secret is like a ConfigMap but intended for sensitive data.
#   Values are stored base64-encoded — NOT encrypted by default.
#   Enable etcd encryption at rest for true security in production.
#
# ⚠️  BASE64 IS ENCODING, NOT ENCRYPTION
#   Anyone with kubectl access to the Secret can decode it instantly:
#     kubectl get secret app-credentials -o jsonpath='{.data.DB_PASSWORD}' | base64 -d
#
# HOW TO CREATE BASE64 VALUES (Linux / macOS / Git Bash):
#   echo -n 'mypassword'    | base64   →  bXlwYXNzd29yZA==
#   echo -n 'supersecretkey'| base64   →  c3VwZXJzZWNyZXRrZXk=
#
#   Note: -n suppresses the trailing newline — always use it.
#         Without -n, the newline is encoded into the value, causing auth failures.
#
# REAL-WORLD ALTERNATIVES (never store raw Secrets in Git):
#   - AWS Secrets Manager + External Secrets Operator
#   - Sealed Secrets (Bitnami) → encrypted YAML safe to commit
#   - HashiCorp Vault + vault-agent-injector
#
# Lab Steps:
#   1. Apply:            kubectl apply -f secret-credentials.yaml
#   2. List secrets:     kubectl get secrets
#   3. Describe (safe):  kubectl describe secret app-credentials
#                        (shows key names but NOT values)
#   4. Decode a value:   kubectl get secret app-credentials \
#                          -o jsonpath='{.data.DB_PASSWORD}' | base64 -d
#   5. Cleanup:          kubectl delete -f secret-credentials.yaml
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: app-credentials
  labels:
    app: env-demo
type: Opaque
data:
  # echo -n 'mypassword' | base64
  DB_PASSWORD: bXlwYXNzd29yZA==

  # echo -n 'supersecretkey' | base64
  API_KEY: c3VwZXJzZWNyZXRrZXk=
